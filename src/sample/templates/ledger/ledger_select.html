{% extends "base.html" %}

{% block main %}
<div class="container mt-4">
  <h4 class="mb-3">帳票一覧</h4>

  <div class="list-group">

    {% for report in reports %}
      {% if report.enabled %}
        <a href="{% url report.url_name %}" class="list-group-item list-group-item-action report-item">
      {% else %}
        <div class="list-group-item report-item disabled" title="この帳票は現在利用できません">
      {% endif %}

        <div class="d-flex align-items-center">

          <!-- アイコン -->
          <div class="me-3">
            <i class="bi {{ report.icon }} fs-3 text-primary"></i>
          </div>

          <!-- テキスト -->
          <div class="flex-grow-1">
            <div class="fw-bold">{{ report.title }}</div>
            <div class="text-muted small">
              {{ report.description }}
            </div>
          </div>

          <!-- 矢印 -->
          <div>
            <i class="bi bi-chevron-right text-muted"></i>
          </div>

        </div>

      {% if report.enabled %}
        </a>
      {% else %}
        </div>
      {% endif %}
    {% endfor %}

  </div>
</div>
{% endblock %}
